services:
  postgres:
    image: postgres:16-alpine
    container_name: flowboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowboard
      POSTGRES_USER: flowboard
      POSTGRES_PASSWORD: flowboard
    ports:
      - "5432:5432"
    volumes:
      - flowboard-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowboard -d flowboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  flowboard-data:
